proxy_location: EveryNode
http_options:
  host: 0.0.0.0
  port: 8000
grpc_options:
  port: 9000
  grpc_servicer_functions: []
logging_config:
  encoding: TEXT
  log_level: INFO
  logs_dir: null
  enable_access_log: true
  additional_log_standard_attrs: []
applications:
- name: translator
  route_prefix: /translator
  import_path: main:translator_app
  runtime_env: {}
  deployments:
  - name: translator
    max_ongoing_requests: 5
    autoscaling_config:
      min_replicas: 1
      initial_replicas: null
      max_replicas: 1
      target_ongoing_requests: 2.0
      metrics_interval_s: 10.0
      look_back_period_s: 30.0
      smoothing_factor: 1.0
      upscale_smoothing_factor: null
      downscale_smoothing_factor: null
      upscaling_factor: null
      downscaling_factor: null
      downscale_delay_s: 600.0
      downscale_to_zero_delay_s: null
      upscale_delay_s: 30.0
      aggregation_function: mean
      policy:
        policy_function: ray.serve.autoscaling_policy:default_autoscaling_policy
    ray_actor_options:
      num_cpus: 0.2
      num_gpus: 0.0
- name: chain
  route_prefix: /chain
  import_path: main:chain_app
  runtime_env: {}
  deployments:
  - name: Adder
  - name: Multiplier
  - name: Chain
- name: stream
  route_prefix: /stream
  import_path: main:stream_app
  runtime_env: {}
  deployments:
  - name: Streamer
  - name: Stream
